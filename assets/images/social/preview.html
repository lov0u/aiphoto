<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIPhoto Social Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .card {
            width: 1200px;
            height: 630px;
            background: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .card-image {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-footer {
            height: 80px;
            background: linear-gradient(135deg, #7c3aed 0%, #f97316 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            padding: 0 40px;
        }
        .card-footer a {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: 0.5px;
        }
        .card-footer span {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-image">
            <img src="social-preview.png" alt="AIPhoto">
        </div>
        <div class="card-footer">
            <a href="#">aiphoto.ra0.cn</a>
            <span>|</span>
            <a href="#">ra0.cn</a>
        </div>
    </div>
</body>
</html>
