<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIPhoto - Agnes 风格预览</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== CSS 变量 ===== */
:root {
    --agnes-green-start: #a8e063;
    --agnes-green-end: #56ab91;
    --agnes-yellow: #f9d423;
    --agnes-blue: #4a6cf7;
    --agnes-purple: #7c3aed;
    --agnes-bg: #ffffff;
    --agnes-card-bg: #ffffff;
    --agnes-text-primary: #1a1a1a;
    --agnes-text-secondary: #8c8c8c;
    --agnes-text-placeholder: #bfbfbf;
    --agnes-border: #eeeeee;
    --agnes-shadow: 0 2px 20px rgba(0,0,0,0.06);
    --agnes-shadow-hover: 0 4px 30px rgba(0,0,0,0.1);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 20px;
    --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ===== 全局重置 ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }

.agnes-global-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    background: linear-gradient(135deg, #f0f9ff 0%, #ffffff 30%, #f0fdf4 60%, #fffbeb 100%);
    pointer-events: none;
}

body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--agnes-text-primary);
    background: transparent;
}

/* ===== App 布局 ===== */
.agnes-app {
    display: flex;
    min-height: 100vh;
}

/* ===== 侧边栏 ===== */
.agnes-sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 72px;
    background: #ffffff;
    border-right: 1px solid var(--agnes-border);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    z-index: 100;
}

.sidebar-logo {
    margin-bottom: 32px;
}

.sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
}

.sidebar-nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 10px 0;
    color: var(--agnes-text-secondary);
    text-decoration: none;
    font-size: 10px;
    border-radius: var(--radius-sm);
    transition: var(--transition);
    width: 52px;
    cursor: pointer;
}

.sidebar-nav-item:hover {
    color: var(--agnes-text-primary);
    background: #f8f8f8;
}

.sidebar-nav-item.active {
    color: var(--agnes-green-end);
    background: linear-gradient(135deg, rgba(168, 224, 99, 0.1), rgba(86, 171, 145, 0.1));
}

.sidebar-bottom {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

/* ===== 主内容区 ===== */
.agnes-main {
    flex: 1;
    margin-left: 72px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* ===== 顶栏 ===== */
.agnes-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 32px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--agnes-border);
    position: sticky;
    top: 0;
    z-index: 50;
}

.topbar-left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.new-work-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    background: #ffffff;
    border: 1px solid var(--agnes-border);
    border-radius: var(--radius-sm);
    color: var(--agnes-text-primary);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
}

.new-work-btn:hover {
    border-color: var(--agnes-green-end);
    color: var(--agnes-green-end);
}

.topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
}

.credits-badge {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 12px;
    background: linear-gradient(135deg, rgba(168, 224, 99, 0.15), rgba(86, 171, 145, 0.15));
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--agnes-green-end);
}

.upgrade-btn {
    padding: 6px 16px;
    background: linear-gradient(135deg, var(--agnes-green-start), var(--agnes-green-end));
    color: #ffffff;
    border: none;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
}

.upgrade-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(86, 171, 145, 0.3);
}

.avatar-circle {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #b3e5fc, #80deea);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    cursor: pointer;
}

/* ===== 内容区 ===== */
.agnes-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 32px 80px;
    max-width: 960px;
    margin: 0 auto;
    width: 100%;
}

/* ===== 欢迎态 ===== */
.agnes-welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    min-height: 400px;
    position: relative;
    text-align: center;
}

.welcome-text {
    position: relative;
    z-index: 2;
}

.welcome-title {
    font-size: 2rem;
    font-weight: 700;
    color: var(--agnes-text-primary);
    margin: 0 0 8px;
    line-height: 1.3;
}

.welcome-subtitle {
    font-size: 2.25rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--agnes-green-start), var(--agnes-green-end));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 0;
    line-height: 1.3;
}

.welcome-visual {
    position: absolute;
    right: -100px;
    top: 50%;
    transform: translateY(-50%);
    width: 300px;
    height: 300px;
    pointer-events: none;
}

.visual-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 3px solid rgba(168, 224, 99, 0.2);
    animation: ringPulse 4s ease-in-out infinite;
}

.visual-ring--2 {
    inset: -30px;
    border-color: rgba(86, 171, 145, 0.15);
    animation-delay: -1.3s;
}

.visual-ring--3 {
    inset: -60px;
    border-color: rgba(249, 212, 35, 0.1);
    animation-delay: -2.6s;
}

@keyframes ringPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.7; }
}

/* ===== 生成器卡片 ===== */
.agnes-generator-card {
    width: 100%;
    margin-top: auto;
    margin-bottom: 32px;
    opacity: 0;
    transform: translateY(20px);
    transition: var(--transition);
    pointer-events: none;
}

.agnes-generator-card.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
}

.card-inner {
    background: var(--agnes-card-bg);
    border: 1px solid var(--agnes-border);
    border-radius: var(--agnes-radius-lg);
    box-shadow: var(--agnes-shadow);
    padding: 20px;
    transition: var(--transition);
}

.card-inner:focus-within {
    box-shadow: var(--agnes-shadow-hover);
    border-color: rgba(86, 171, 145, 0.3);
}

/* 上传区域 */
.card-upload-area {
    position: relative;
    display: flex;
    align-items: flex-start;
    margin-bottom: 12px;
}

.upload-plus-btn {
    width: 44px;
    height: 44px;
    min-width: 44px;
    background: #ffffff;
    border: 1px dashed #d0d0d0;
    border-radius: var(--radius-sm);
    font-size: 24px;
    font-weight: 300;
    color: #999;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-right: 12px;
}

.upload-plus-btn:hover {
    border-color: var(--agnes-green-end);
    color: var(--agnes-green-end);
    background: rgba(168, 224, 99, 0.05);
}

.upload-previews {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex: 1;
}

.upload-preview-item {
    position: relative;
    width: 64px;
    height: 64px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid var(--agnes-border);
}

.upload-preview-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.upload-preview-remove {
    position: absolute;
    top: 2px;
    right: 2px;
    width: 18px;
    height: 18px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 文本输入 */
.card-textarea {
    width: 100%;
    min-height: 48px;
    max-height: 200px;
    padding: 12px 0;
    border: none;
    outline: none;
    resize: none;
    font-size: 15px;
    line-height: 1.6;
    color: var(--agnes-text-primary);
    background: transparent;
    font-family: inherit;
}

.card-textarea::placeholder {
    color: var(--agnes-text-placeholder);
}

/* 底部工具栏 */
.card-toolbar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding-top: 12px;
    border-top: 1px solid #f0f0f0;
}

.toolbar-group {
    display: flex;
    align-items: center;
}

.toolbar-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    background: transparent;
    border: none;
    border-radius: var(--radius-sm);
    color: var(--agnes-text-secondary);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
}

.toolbar-btn:hover {
    background: #f5f5f5;
    color: var(--agnes-text-primary);
}

.toolbar-btn--model {
    color: var(--agnes-blue);
}

.toolbar-btn--model:hover {
    background: rgba(74, 108, 247, 0.08);
}

.toolbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-left: auto;
}

.credits-small {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--agnes-text-secondary);
}

.send-btn {
    width: 36px;
    height: 36px;
    background: #e0e0e0;
    border: none;
    border-radius: 50%;
    color: #ffffff;
    cursor: not-allowed;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
}

.send-btn.active {
    background: linear-gradient(135deg, var(--agnes-green-start), var(--agnes-green-end));
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(86, 171, 145, 0.3);
}

.send-btn.active:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 12px rgba(86, 171, 145, 0.4);
}

/* ===== 发现 Tabs ===== */
.agnes-discover-tabs {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 16px;
}

.discover-tabs-inner {
    display: flex;
    gap: 4px;
    background: #f5f5f5;
    border-radius: 20px;
    padding: 3px;
}

.discover-tab {
    padding: 6px 20px;
    background: transparent;
    border: none;
    border-radius: 18px;
    font-size: 13px;
    color: var(--agnes-text-secondary);
    cursor: pointer;
    transition: var(--transition);
}

.discover-tab.active {
    background: #ffffff;
    color: var(--agnes-text-primary);
    font-weight: 600;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.discover-upload {
    font-size: 13px;
    color: var(--agnes-green-end);
    text-decoration: none;
    font-weight: 500;
}

/* ===== 底部推荐 ===== */
.agnes-recommended {
    width: 100%;
    overflow: hidden;
}

.rec-scroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 8px;
    scrollbar-width: none;
}

.rec-scroll::-webkit-scrollbar {
    display: none;
}

.rec-card {
    min-width: 200px;
    height: 120px;
    border-radius: var(--radius-md);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: var(--transition);
    background: #f0f0f0;
    flex-shrink: 0;
}

.rec-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.1);
}

.rec-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.rec-card-overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.6));
    color: #fff;
    font-size: 12px;
    font-weight: 500;
}

/* ===== 设置弹窗 ===== */
.agnes-settings-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: var(--transition);
}

.agnes-settings-overlay.open {
    opacity: 1;
    visibility: visible;
}

.agnes-settings-panel {
    background: #ffffff;
    border-radius: var(--agnes-radius-lg);
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    padding: 28px;
    width: 100%;
    max-width: 520px;
    position: relative;
    transform: translateY(20px);
    transition: var(--transition);
}

.agnes-settings-overlay.open .agnes-settings-panel {
    transform: translateY(0);
}

.settings-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--agnes-text-primary);
    margin: 0 0 24px;
}

.settings-section {
    margin-bottom: 28px;
}

.settings-label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--agnes-text-secondary);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

/* 比例网格 */
.ratio-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.ratio-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 10px 14px;
    background: #f5f5f5;
    border: 2px solid transparent;
    border-radius: var(--radius-md);
    color: var(--agnes-text-secondary);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    min-width: 56px;
}

.ratio-btn:hover {
    background: #f0f0f0;
    color: var(--agnes-text-primary);
}

.ratio-btn.active {
    background: #ffffff;
    border-color: var(--agnes-green-end);
    color: var(--agnes-green-end);
    box-shadow: 0 2px 8px rgba(86, 171, 145, 0.15);
}

.ratio-btn svg {
    width: 24px;
    height: 24px;
}

/* 分辨率组 */
.resolution-group {
    display: flex;
    background: #f0f0f0;
    border-radius: var(--radius-md);
    padding: 4px;
    gap: 4px;
}

.res-btn {
    flex: 1;
    padding: 12px 20px;
    background: transparent;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    color: var(--agnes-text-secondary);
    cursor: pointer;
    transition: var(--transition);
}

.res-btn:hover {
    color: var(--agnes-text-primary);
}

.res-btn.active {
    background: #ffffff;
    color: var(--agnes-text-primary);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* 关闭按钮 */
.settings-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 32px;
    height: 32px;
    background: #f5f5f5;
    border: none;
    border-radius: 50%;
    color: var(--agnes-text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
}

.settings-close:hover {
    background: #eee;
    color: var(--agnes-text-primary);
}

/* ===== 生成结果展示 ===== */
.agnes-result-section {
    width: 100%;
    margin-top: 40px;
    display: none;
}

.agnes-result-section.visible {
    display: block;
}

.result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
}

.result-header h3 {
    font-size: 16px;
    font-weight: 600;
    color: var(--agnes-text-primary);
}

.result-actions {
    display: flex;
    gap: 8px;
}

.result-action-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: #f5f5f5;
    border: 1px solid var(--agnes-border);
    border-radius: var(--radius-sm);
    color: var(--agnes-text-secondary);
    font-size: 13px;
    cursor: pointer;
    transition: var(--transition);
}

.result-action-btn:hover {
    background: #fff;
    border-color: var(--agnes-green-end);
    color: var(--agnes-green-end);
}

.result-image-container {
    background: #ffffff;
    border: 1px solid var(--agnes-border);
    border-radius: var(--agnes-radius-lg);
    overflow: hidden;
    box-shadow: var(--agnes-shadow);
    text-align: center;
}

.result-image-container img {
    max-width: 100%;
    max-height: 600px;
    object-fit: contain;
    display: block;
    margin: 0 auto;
}

.result-error {
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: var(--radius-md);
    padding: 16px;
    color: #dc2626;
    font-size: 14px;
    text-align: center;
}

/* ===== 加载状态 ===== */
.agnes-loading {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 40px;
}

.agnes-loading.visible {
    display: flex;
}

.loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #f0f0f0;
    border-top-color: var(--agnes-green-end);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

.loading-text {
    font-size: 14px;
    color: var(--agnes-text-secondary);
}

.loading-progress {
    width: 100%;
    max-width: 400px;
    background: #f0f0f0;
    border-radius: 4px;
    height: 4px;
    overflow: hidden;
}

.loading-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--agnes-green-start), var(--agnes-green-end));
    border-radius: 4px;
    width: 0%;
    transition: width 0.3s ease;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* ===== 最近生成（侧边列表） ===== */
.recent-work-list {
    position: fixed;
    left: 72px;
    top: 0;
    bottom: 0;
    width: 240px;
    background: #ffffff;
    border-right: 1px solid var(--agnes-border);
    padding: 20px 12px;
    overflow-y: auto;
    z-index: 90;
    transform: translateX(-100%);
    transition: var(--transition);
}

.recent-work-list.visible {
    transform: translateX(0);
}

.recent-work-list h4 {
    font-size: 13px;
    font-weight: 600;
    color: var(--agnes-text-secondary);
    margin: 0 0 12px;
    padding: 0 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.recent-work-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: var(--transition);
    margin-bottom: 4px;
}

.recent-work-item:hover {
    background: #f5f5f5;
}

.recent-work-thumb {
    width: 48px;
    height: 48px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    flex-shrink: 0;
}

.recent-work-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.recent-work-info {
    flex: 1;
    min-width: 0;
}

.recent-work-title {
    font-size: 12px;
    color: var(--agnes-text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.recent-work-time {
    font-size: 10px;
    color: var(--agnes-text-placeholder);
    margin-top: 2px;
}

/* ===== 响应式 ===== */
@media (max-width: 768px) {
    .agnes-sidebar {
        display: none;
    }

    .agnes-main {
        margin-left: 0;
    }

    .agnes-content {
        padding: 24px 16px 60px;
    }

    .welcome-title {
        font-size: 1.5rem;
    }

    .welcome-subtitle {
        font-size: 1.75rem;
    }

    .welcome-visual {
        display: none;
    }

    .card-inner {
        padding: 16px;
    }

    .agnes-settings-panel {
        margin: 16px;
        max-width: calc(100% - 32px);
    }

    .ratio-btn {
        padding: 8px 10px;
        min-width: 48px;
        font-size: 11px;
    }

    .topbar {
        padding: 12px 16px;
    }

    .recent-work-list {
        width: 200px;
    }
}

@media (max-width: 480px) {
    .toolbar-btn {
        padding: 6px 8px;
        font-size: 12px;
    }

    .toolbar-btn span.btn-text {
        display: none;
    }

    .resolution-group .res-btn {
        padding: 10px 12px;
        font-size: 13px;
    }
}

    bottom: 16px;
    right: 16px;

}
</style>

<body>

<!-- 全局背景 -->

<!-- App 容器 -->

                    3:2

                <button type="button" class="res-btn" data-res="2K">2K</button>

        </button>

<script>
// ===== 预览模式交互脚本 =====
(function() {
    'use strict';

    var state = {
        hasInput: false,
        selectedRatio: 'auto',
        selectedResolution: '1K',
        uploadedImages: []
    };

    var promptInput = document.getElementById('agnesPrompt');
    var welcomeEl = document.getElementById('agnesWelcome');
    var cardEl = document.getElementById('agnesCard');
    var discoverTabs = document.getElementById('discoverTabs');
    var recSection = document.getElementById('recommendedSection');
    var newWorkBtn = document.getElementById('newWorkBtn');
    var sendBtn = document.getElementById('sendBtn');

    // 输入变化
    promptInput.addEventListener('input', function() {
        var hasText = this.value.trim().length > 0;
        var hasImages = state.uploadedImages.length > 0;

        if (hasText || hasImages) {
            if (!state.hasInput) {
                welcomeEl.style.display = 'none';
                cardEl.classList.add('visible');
                if (discoverTabs) discoverTabs.style.display = 'flex';
                if (recSection) recSection.style.display = 'block';
                if (newWorkBtn) newWorkBtn.style.display = 'inline-flex';
                state.hasInput = true;
            }
        } else {
            if (state.hasInput && state.uploadedImages.length === 0) {
                welcomeEl.style.display = '';
                cardEl.classList.remove('visible');
                if (discoverTabs) discoverTabs.style.display = 'none';
                if (recSection) recSection.style.display = 'none';
                if (newWorkBtn) newWorkBtn.style.display = 'none';
                state.hasInput = false;
            }
        }

        updateSendButton();
    });

    // 新作品
    if (newWorkBtn) {
        newWorkBtn.addEventListener('click', function() {
            promptInput.value = '';
            state.uploadedImages = [];
            renderUploadPreviews();
            promptInput.dispatchEvent(new Event('input'));
            promptInput.focus();
        });
    }

    // 发送按钮
    updateSendButton();

    function updateSendButton() {
        var hasContent = promptInput.value.trim().length > 0 || state.uploadedImages.length > 0;
        sendBtn.classList.toggle('active', hasContent);
    }

    // 设置面板
    var settingsBtn = document.getElementById('settingsBtn');
    var overlay = document.getElementById('settingsOverlay');
    var closeBtn = document.getElementById('settingsClose');
    var ratioGrid = document.getElementById('ratioGrid');
    var resGroup = document.getElementById('resolutionGroup');

    if (settingsBtn) {
        settingsBtn.addEventListener('click', function() {
            overlay.style.display = 'flex';
            requestAnimationFrame(function() {
                overlay.classList.add('open');
            });
        });
    }

    function closeSettings() {
        overlay.classList.remove('open');
        setTimeout(function() {
            overlay.style.display = 'none';
        }, 250);
    }

    if (closeBtn) closeBtn.addEventListener('click', closeSettings);
    if (overlay) {
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) closeSettings();
        });
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && overlay.classList.contains('open')) {
            closeSettings();
        }
    });

    if (ratioGrid) {
        ratioGrid.addEventListener('click', function(e) {
            var btn = e.target.closest('.ratio-btn');
            if (!btn) return;
            ratioGrid.querySelectorAll('.ratio-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            state.selectedRatio = btn.getAttribute('data-ratio');
        });
    }

    if (resGroup) {
        resGroup.addEventListener('click', function(e) {
            var btn = e.target.closest('.res-btn');
            if (!btn) return;
            resGroup.querySelectorAll('.res-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            state.selectedResolution = btn.getAttribute('data-res');
        });
    }

    // 上传
    var uploadBtn = document.getElementById('uploadPlusBtn');
    var fileInput = document.getElementById('fileInput');

    if (uploadBtn && fileInput) {
        uploadBtn.addEventListener('click', function() {
            fileInput.click();
        });

        fileInput.addEventListener('change', function() {
            var files = Array.from(this.files);
            files.forEach(function(file) {
                if (state.uploadedImages.length >= 4) return;
                var reader = new FileReader();
                reader.onload = function(e) {
                    state.uploadedImages.push(e.target.result);
                    renderUploadPreviews();
                    var pi = document.getElementById('agnesPrompt');
                    if (pi && !state.hasInput) {
                        pi.dispatchEvent(new Event('input'));
                    }
                };
                reader.readAsDataURL(file);
            });
            fileInput.value = '';
        });
    }

    function renderUploadPreviews() {
        var container = document.getElementById('uploadPreviews');
        if (!container) return;
        container.innerHTML = '';
        state.uploadedImages.forEach(function(src, idx) {
            var div = document.createElement('div');
            div.className = 'upload-preview-item';
            div.innerHTML = '<img src="' + src + '" alt="参考图"><button type="button" class="upload-preview-remove" data-idx="' + idx + '">✕</button>';
            container.appendChild(div);
        });
        container.querySelectorAll('.upload-preview-remove').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                state.uploadedImages.splice(parseInt(this.getAttribute('data-idx')), 1);
                renderUploadPreviews();
                var pi = document.getElementById('agnesPrompt');
                if (pi) pi.dispatchEvent(new Event('input'));
            });
        });
    }

    // 发送按钮点击（预览模式模拟）
    sendBtn.addEventListener('click', function() {
        if (!this.classList.contains('active')) return;
        alert('🎨 预览模式：布局已展示，功能需部署到 WordPress 后测试。\n\n当前提示词：' + (promptInput.value.trim() || '(无)') + '\n比例：' + state.selectedRatio + '\n分辨率：' + state.selectedResolution);
    });

    // Enter 发送
    promptInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendBtn.click();
        }
    });

    // 侧边栏切换
    document.querySelectorAll('.sidebar-nav-item').forEach(function(item) {
        item.addEventListener('click', function(e) {
            e.preventDefault();
            document.querySelectorAll('.sidebar-nav-item').forEach(function(i) { i.classList.remove('active'); });
            this.classList.add('active');
        });
    });

    // 发现 Tabs
    document.querySelectorAll('.discover-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.discover-tab').forEach(function(t) { t.classList.remove('active'); });
            this.classList.add('active');
        });
    });

})();
</script>

</body>
</html>
