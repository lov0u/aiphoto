<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIPhoto - Agnes 风格预览</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ===== 模拟页眉 ===== */
.sim-header {
    height: 64px;
    background: #ffffff;
    border-bottom: 1px solid #eee;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
}

.sim-header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
    color: #1a1a1a;
}

.sim-header-logo svg {
    width: 28px;
    height: 28px;
}

.sim-header-nav {
    display: flex;
    align-items: center;
    gap: 24px;
}

.sim-header-nav a {
    font-size: 14px;
    color: #666;
    text-decoration: none;
    font-weight: 500;
}

.sim-header-nav a:hover { color: #1a1a1a; }
.sim-header-nav .nav-active { color: #1a1a1a; }

.sim-header-right {
    display: flex;
    align-items: center;
    gap: 12px;
}

.sim-header-right .credits-badge {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: linear-gradient(135deg, rgba(168,224,99,0.15), rgba(86,171,145,0.15));
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    color: #56ab91;
}

.sim-header-right .upgrade-btn {
    padding: 5px 14px;
    background: linear-gradient(135deg, #a8e063, #56ab91);
    color: #fff;
    border: none;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
}

.sim-header-right .avatar-circle {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, #b3e5fc, #80deea);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    cursor: pointer;
}

/* ===== CSS 变量 ===== */
:root {
    --agnes-green-start: #a8e063;
    --agnes-green-end: #56ab91;
    --agnes-blue: #4a6cf7;
    --agnes-text-primary: #1a1a1a;
    --agnes-text-secondary: #8c8c8c;
    --agnes-text-placeholder: #bfbfbf;
    --agnes-border: #eeeeee;
    --agnes-shadow: 0 2px 20px rgba(0,0,0,0.06);
    --agnes-shadow-hover: 0 4px 30px rgba(0,0,0,0.1);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
    --radius-xl: 18px;
    --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

.agnes-global-bg {
    position: fixed;
    inset: 0;
    z-index: -1;
    top: 64px;
    background: linear-gradient(135deg, #f0f9ff 0%, #ffffff 30%, #f0fdf4 60%, #fffbeb 100%);
    pointer-events: none;
}

body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--agnes-text-primary);
}

/* ===== 主内容区 ===== */
.agnes-main {
    display: flex;
    flex-direction: column;
    min-height: calc(100vh - 64px);
    padding: 40px 32px 80px;
    max-width: 880px;
    margin: 0 auto;
    width: 100%;
}

/* ===== 欢迎文案（居中偏上） ===== */
.agnes-welcome {
    text-align: center;
    margin-bottom: 32px;
    flex-shrink: 0;
}

.welcome-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--agnes-text-primary);
    margin: 0 0 6px;
    line-height: 1.3;
}

.welcome-subtitle {
    font-size: 1.75rem;
    font-weight: 800;
    background: linear-gradient(135deg, var(--agnes-green-start), var(--agnes-green-end));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 0;
    line-height: 1.3;
}

/* ===== 生成器卡片 ===== */
.agnes-generator-card {
    width: 100%;
    margin-bottom: 24px;
    flex-shrink: 0;
}

.card-inner {
    background: #ffffff;
    border: 1px solid var(--agnes-border);
    border-radius: var(--radius-xl);
    box-shadow: var(--agnes-shadow);
    padding: 18px;
    transition: var(--transition);
}

.card-inner:focus-within {
    box-shadow: var(--agnes-shadow-hover);
    border-color: rgba(86, 171, 145, 0.25);
}

/* 上传区域 */
.card-upload-area {
    position: relative;
    display: flex;
    align-items: flex-start;
    margin-bottom: 10px;
}

.upload-plus-btn {
    width: 40px; height: 40px; min-width: 40px;
    background: #ffffff;
    border: 1px dashed #d0d0d0;
    border-radius: var(--radius-sm);
    font-size: 22px; font-weight: 300;
    color: #999;
    cursor: pointer;
    transition: var(--transition);
    display: flex; align-items: center; justify-content: center;
    margin-right: 10px;
}

.upload-plus-btn:hover {
    border-color: var(--agnes-green-end);
    color: var(--agnes-green-end);
    background: rgba(168, 224, 99, 0.05);
}

.upload-previews {
    display: flex; gap: 6px; flex-wrap: wrap; flex: 1;
}

.upload-preview-item {
    position: relative;
    width: 56px; height: 56px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 1px solid var(--agnes-border);
}

.upload-preview-item img {
    width: 100%; height: 100%; object-fit: cover;
}

.upload-preview-remove {
    position: absolute; top: 1px; right: 1px;
    width: 16px; height: 16px;
    background: rgba(0,0,0,0.6);
    color: #fff; border: none;
    border-radius: 50%; font-size: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}

/* 文本输入 */
.card-textarea {
    width: 100%;
    min-height: 44px;
    max-height: 180px;
    padding: 10px 0;
    border: none;
    outline: none;
    resize: none;
    font-size: 14px;
    line-height: 1.6;
    color: var(--agnes-text-primary);
    background: transparent;
    font-family: inherit;
}

.card-textarea::placeholder { color: var(--agnes-text-placeholder); }

/* 底部工具栏 */
.card-toolbar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding-top: 10px;
    border-top: 1px solid #f0f0f0;
}

.toolbar-group { display: flex; align-items: center; }

.toolbar-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 10px;
    background: transparent;
    border: none;
    border-radius: var(--radius-sm);
    color: var(--agnes-text-secondary);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
}

.toolbar-btn:hover { background: #f5f5f5; color: var(--agnes-text-primary); }

.toolbar-btn--model { color: var(--agnes-blue); }
.toolbar-btn--model:hover { background: rgba(74, 108, 247, 0.08); }

.toolbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
}

.credits-small {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    color: var(--agnes-text-secondary);
}

.send-btn {
    width: 34px; height: 34px;
    background: #e0e0e0;
    border: none;
    border-radius: 50%;
    color: #ffffff;
    cursor: not-allowed;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
}

.send-btn.active {
    background: linear-gradient(135deg, var(--agnes-green-start), var(--agnes-green-end));
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(86, 171, 145, 0.3);
}

.send-btn.active:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 12px rgba(86, 171, 145, 0.4);
}

/* ===== 发现 Tabs ===== */
.agnes-discover-tabs {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 16px;
    flex-shrink: 0;
}

.discover-tabs-inner {
    display: flex;
    gap: 4px;
    background: #f5f5f5;
    border-radius: 20px;
    padding: 3px;
}

.discover-tab {
    padding: 6px 20px;
    background: transparent;
    border: none;
    border-radius: 18px;
    font-size: 13px;
    color: var(--agnes-text-secondary);
    cursor: pointer;
    transition: var(--transition);
}

.discover-tab.active {
    background: #ffffff;
    color: var(--agnes-text-primary);
    font-weight: 600;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}

.discover-upload {
    font-size: 13px;
    color: var(--agnes-green-end);
    text-decoration: none;
    font-weight: 500;
}

/* ===== 底部推荐 ===== */
.agnes-recommended {
    width: 100%;
    overflow: hidden;
    flex-shrink: 0;
}

.rec-scroll {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 8px;
    scrollbar-width: none;
}

.rec-scroll::-webkit-scrollbar { display: none; }

.rec-card {
    min-width: 180px;
    height: 110px;
    border-radius: var(--radius-md);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: var(--transition);
    background: #f0f0f0;
    flex-shrink: 0;
}

.rec-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

.rec-card-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 10px;
    background: linear-gradient(transparent, rgba(0,0,0,0.5));
    color: #fff;
    font-size: 11px;
    font-weight: 500;
}

/* ===== 设置弹窗 ===== */
.agnes-settings-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: var(--transition);
}

.agnes-settings-overlay.open {
    opacity: 1;
    visibility: visible;
}

.agnes-settings-panel {
    background: #ffffff;
    border-radius: var(--radius-xl);
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    padding: 28px;
    width: 100%;
    max-width: 500px;
    position: relative;
    transform: translateY(20px);
    transition: var(--transition);
}

.agnes-settings-overlay.open .agnes-settings-panel {
    transform: translateY(0);
}

.settings-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--agnes-text-primary);
    margin: 0 0 24px;
}

.settings-section { margin-bottom: 28px; }

.settings-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--agnes-text-secondary);
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.ratio-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.ratio-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 10px 12px;
    background: #f5f5f5;
    border: 2px solid transparent;
    border-radius: var(--radius-md);
    color: var(--agnes-text-secondary);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    min-width: 52px;
}

.ratio-btn:hover { background: #f0f0f0; color: var(--agnes-text-primary); }

.ratio-btn.active {
    background: #ffffff;
    border-color: var(--agnes-green-end);
    color: var(--agnes-green-end);
    box-shadow: 0 2px 8px rgba(86, 171, 145, 0.15);
}

.ratio-btn svg { width: 22px; height: 22px; }

.resolution-group {
    display: flex;
    background: #f0f0f0;
    border-radius: var(--radius-md);
    padding: 4px;
    gap: 4px;
}

.res-btn {
    flex: 1;
    padding: 12px 20px;
    background: transparent;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    color: var(--agnes-text-secondary);
    cursor: pointer;
    transition: var(--transition);
}

.res-btn:hover { color: var(--agnes-text-primary); }

.res-btn.active {
    background: #ffffff;
    color: var(--agnes-text-primary);
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.settings-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 32px; height: 32px;
    background: #f5f5f5;
    border: none;
    border-radius: 50%;
    color: var(--agnes-text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
}

.settings-close:hover { background: #eee; color: var(--agnes-text-primary); }

/* ===== 左侧作品列表 ===== */
.agnes-recent-sidebar {
    position: fixed;
    left: 0;
    top: 64px;
    bottom: 0;
    width: 220px;
    background: #ffffff;
    border-right: 1px solid var(--agnes-border);
    display: flex;
    flex-direction: column;
    z-index: 80;
    transform: translateX(-100%);
    transition: var(--transition);
    overflow: hidden;
}

.agnes-recent-sidebar.visible {
    transform: translateX(0);
}

.recent-sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 12px 8px;
    gap: 4px;
}

.new-work-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    background: transparent;
    border: none;
    border-radius: var(--radius-sm);
    color: var(--agnes-text-primary);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
}

.new-work-btn:hover { background: #f5f5f5; }

.sidebar-collapse-btn {
    width: 24px; height: 24px;
    background: transparent;
    border: none;
    border-radius: var(--radius-sm);
    color: var(--agnes-text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
}

.sidebar-collapse-btn:hover { background: #f5f5f5; }

.recent-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 8px 12px;
}

.recent-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: var(--transition);
    margin-bottom: 2px;
}

.recent-item:hover { background: #f5f5f5; }

.recent-thumb {
    width: 44px; height: 44px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    flex-shrink: 0;
    background: #f0f0f0;
}

.recent-thumb img {
    width: 100%; height: 100%; object-fit: cover;
}

.recent-info { flex: 1; min-width: 0; overflow: hidden; }

.recent-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--agnes-text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.recent-prompt {
    font-size: 10px;
    color: var(--agnes-text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
}

/* ===== 生成结果 ===== */
.agnes-result-section { width: 100%; margin-top: 40px; }

.result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
}

.result-header h3 {
    font-size: 16px;
    font-weight: 600;
    color: var(--agnes-text-primary);
}

.result-actions { display: flex; gap: 8px; }

.result-action-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: #f5f5f5;
    border: 1px solid var(--agnes-border);
    border-radius: var(--radius-sm);
    color: var(--agnes-text-secondary);
    font-size: 13px;
    cursor: pointer;
    transition: var(--transition);
}

.result-action-btn:hover {
    background: #fff;
    border-color: var(--agnes-green-end);
    color: var(--agnes-green-end);
}

.result-image-container {
    background: #ffffff;
    border: 1px solid var(--agnes-border);
    border-radius: var(--radius-xl);
    overflow: hidden;
    box-shadow: var(--agnes-shadow);
    text-align: center;
}

.result-image-container img {
    max-width: 100%;
    max-height: 600px;
    object-fit: contain;
    display: block;
    margin: 0 auto;
}

.result-error {
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: var(--radius-md);
    padding: 16px;
    color: #dc2626;
    font-size: 14px;
    text-align: center;
}

/* ===== 加载状态 ===== */
.agnes-loading {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 40px;
    width: 100%;
}

.agnes-loading.visible { display: flex; }

.loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid #f0f0f0;
    border-top-color: var(--agnes-green-end);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

.loading-text {
    font-size: 14px;
    color: var(--agnes-text-secondary);
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ===== 灯箱 ===== */
.lightbox {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: var(--transition);
}

.lightbox.is-open {
    opacity: 1;
    visibility: visible;
}

.lightbox-close {
    position: absolute;
    top: 20px; right: 20px;
    width: 40px; height: 40px;
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.lightbox-img {
    max-width: 90vw;
    max-height: 80vh;
    object-fit: contain;
    border-radius: 8px;
}

.lightbox-caption {
    color: #fff;
    text-align: center;
    margin-top: 16px;
    font-size: 14px;
    max-width: 600px;
    padding: 0 20px;
}

/* ===== 预览指示器 ===== */
.preview-indicator {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: #1a1a1a;
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    z-index: 9999;
    opacity: 0.7;
}

/* ===== 响应式 ===== */
@media (max-width: 768px) {
    .agnes-main { padding: 32px 16px 60px; }
    .welcome-title { font-size: 1.25rem; }
    .welcome-subtitle { font-size: 1.4rem; }
    .card-inner { padding: 14px; }
    .agnes-settings-panel { margin: 16px; max-width: calc(100% - 32px); }
    .ratio-btn { padding: 8px 10px; min-width: 44px; font-size: 10px; }
    .sim-header-nav { display: none; }
}

@media (max-width: 480px) {
    .toolbar-btn span.btn-text { display: none; }
    .resolution-group .res-btn { padding: 10px 12px; font-size: 13px; }
}
</style>
</head>
<body>

<!-- 模拟页眉 -->
<header class="sim-header">
    <div class="sim-header-logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="url(#logoGrad)"/>
            <path d="M8 14C8 10.6863 10.6863 8 14 8C17.3137 8 20 10.6863 20 14" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <path d="M14 20C10.6863 20 8 17.3137 8 14" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <defs><linearGradient id="logoGrad" x1="0" y1="0" x2="28" y2="28"><stop stop-color="#a8e063"/><stop offset="1" stop-color="#56ab91"/></linearGradient></defs>
        </svg>
        <span>AIPhoto</span>
    </div>
    <nav class="sim-header-nav">
        <a href="#" class="nav-active">首页</a>
        <a href="#">画廊</a>
        <a href="#">视频</a>
    </nav>
    <div class="sim-header-right">
        <div class="credits-badge">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M8 10h8M8 14h8"/></svg>
            66
        </div>
        <button class="upgrade-btn">升级</button>
        <div class="avatar-circle">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
    </div>
</header>

<!-- 全局背景 -->
<div class="agnes-global-bg"></div>

<!-- 预览指示器 -->
<div class="preview-indicator">🎨 布局预览 — 仅展示 UI</div>

<!-- 主内容区 -->
<main class="agnes-main">

    <!-- 欢迎文案 -->
    <div class="agnes-welcome" id="agnesWelcome">

<script>
(function() {
    'use strict';

    var state = {
        hasInput: false,
        selectedRatio: 'auto',
        selectedResolution: '1K',
        uploadedImages: [],
        sidebarVisible: false
    };

    var promptInput = document.getElementById('agnesPrompt');
    var welcomeEl = document.getElementById('agnesWelcome');
    var sidebar = document.getElementById('agnesRecentSidebar');
    var sendBtn = document.getElementById('sendBtn');

    // 输入变化 → 控制欢迎文案显隐 + 侧边栏
    promptInput.addEventListener('input', function() {
        var hasText = this.value.trim().length > 0;
        var hasImages = state.uploadedImages.length > 0;

        if (hasText || hasImages) {
            if (!state.hasInput) {
                welcomeEl.style.opacity = '0';
                welcomeEl.style.transform = 'translateY(-10px)';
                state.hasInput = true;
            }
            if (sidebar && !state.sidebarVisible) {
                sidebar.classList.add('visible');
                state.sidebarVisible = true;
            }
        } else {
            if (state.hasInput && state.uploadedImages.length === 0) {
                welcomeEl.style.opacity = '1';
                welcomeEl.style.transform = 'translateY(0)';
                state.hasInput = false;
            }
            if (sidebar && state.sidebarVisible) {
                sidebar.classList.remove('visible');
                state.sidebarVisible = false;
            }
        }

        updateSendButton();
    });

    // 新作品
    var newWorkBtn = document.getElementById('newWorkBtn');
    if (newWorkBtn) {
        newWorkBtn.addEventListener('click', function() {
            promptInput.value = '';
            state.uploadedImages = [];
            renderUploadPreviews();
            promptInput.dispatchEvent(new Event('input'));
            promptInput.focus();
        });
    }

    // 侧边栏收起
    var collapseBtn = document.getElementById('sidebarCollapse');
    if (collapseBtn) {
        collapseBtn.addEventListener('click', function() {
            sidebar.classList.remove('visible');
            state.sidebarVisible = false;
        });
    }

    // 发送按钮
    updateSendButton();

    function updateSendButton() {
        var hasContent = promptInput.value.trim().length > 0 || state.uploadedImages.length > 0;
        sendBtn.classList.toggle('active', hasContent);
    }

    // 设置面板
    var settingsBtn = document.getElementById('settingsBtn');
    var overlay = document.getElementById('settingsOverlay');
    var closeBtn = document.getElementById('settingsClose');
    var ratioGrid = document.getElementById('ratioGrid');
    var resGroup = document.getElementById('resolutionGroup');

    if (settingsBtn) {
        settingsBtn.addEventListener('click', function() {
            overlay.style.display = 'flex';
            requestAnimationFrame(function() { overlay.classList.add('open'); });
        });
    }

    function closeSettings() {
        overlay.classList.remove('open');
        setTimeout(function() { overlay.style.display = 'none'; }, 250);
    }

    if (closeBtn) closeBtn.addEventListener('click', closeSettings);
    if (overlay) {
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) closeSettings();
        });
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && overlay.classList.contains('open')) closeSettings();
    });

    if (ratioGrid) {
        ratioGrid.addEventListener('click', function(e) {
            var btn = e.target.closest('.ratio-btn');
            if (!btn) return;
            ratioGrid.querySelectorAll('.ratio-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            state.selectedRatio = btn.getAttribute('data-ratio');
        });
    }

    if (resGroup) {
        resGroup.addEventListener('click', function(e) {
            var btn = e.target.closest('.res-btn');
            if (!btn) return;
            resGroup.querySelectorAll('.res-btn').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
            state.selectedResolution = btn.getAttribute('data-res');
        });
    }

    // 上传
    var uploadBtn = document.getElementById('uploadPlusBtn');
    var fileInput = document.getElementById('fileInput');

    if (uploadBtn && fileInput) {
        uploadBtn.addEventListener('click', function() { fileInput.click(); });
        fileInput.addEventListener('change', function() {
            var files = Array.from(this.files);
            files.forEach(function(file) {
                if (state.uploadedImages.length >= 4) return;
                var reader = new FileReader();
                reader.onload = function(e) {
                    state.uploadedImages.push(e.target.result);
                    renderUploadPreviews();
                    var pi = document.getElementById('agnesPrompt');
                    if (pi && !state.hasInput) pi.dispatchEvent(new Event('input'));
                };
                reader.readAsDataURL(file);
            });
            fileInput.value = '';
        });
    }

    function renderUploadPreviews() {
        var container = document.getElementById('uploadPreviews');
        if (!container) return;
        container.innerHTML = '';
        state.uploadedImages.forEach(function(src, idx) {
            var div = document.createElement('div');
            div.className = 'upload-preview-item';
            div.innerHTML = '<img src="' + src + '" alt="参考图"><button type="button" class="upload-preview-remove" data-idx="' + idx + '">✕</button>';
            container.appendChild(div);
        });
        container.querySelectorAll('.upload-preview-remove').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                state.uploadedImages.splice(parseInt(this.getAttribute('data-idx')), 1);
                renderUploadPreviews();
                var pi = document.getElementById('agnesPrompt');
                if (pi) pi.dispatchEvent(new Event('input'));
            });
        });
    }

    // 发送
    sendBtn.addEventListener('click', function() {
        if (!this.classList.contains('active')) return;
        alert('🎨 预览模式：布局已展示，功能需部署到 WordPress 后测试。\n\n提示词：' + (promptInput.value.trim() || '(无)') + '\n比例：' + state.selectedRatio + '\n分辨率：' + state.selectedResolution);
    });

    // Enter 发送
    promptInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendBtn.click();
        }
    });

    // 文本框自适应
    promptInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 180) + 'px';
    });

    // 发现 Tabs
    document.querySelectorAll('.discover-tab').forEach(function(tab) {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.discover-tab').forEach(function(t) { t.classList.remove('active'); });
            this.classList.add('active');
        });
    });

    // 侧边栏作品点击
    document.querySelectorAll('.recent-item').forEach(function(item) {
        item.addEventListener('click', function() {
            var prompt = this.getAttribute('data-prompt');
            if (prompt) {
                promptInput.value = prompt;
                promptInput.dispatchEvent(new Event('input'));
            }
        });
    });

})();
</script>
